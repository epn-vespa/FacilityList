# A strategy defines a sequence of disambiguation scores to compute on lists.
# One line of the strategy processes a disambiguation between two lists.
#
# Format:
#   list1,list2[type]:scores,to,compute,-except,-scores
#   > "For list1 and list2, compute scores on types except for the scores"
#
# example:
#   spase,aas:tfidf_cosine_similarity,
#   pds,wikidata[all]:all,-fuzzy_levenshtein,-sentence_cosine_similarity
#
# No need to define merging strategy for pair of lists, as they will
# automatically be merged to each other (strategy already in the code):
#   naif,wikidata
#
# Author:
#   Liza Fretel (liza.fretel@obspm.fr)
#
#
# Available scores          | Type | Description                            | When to use
# --------------------------|-------|----------------------------------------|----------------------------------
# label_match               | Accept   | Any label or alt label are identical   | When same naming convention
#---------------------------|-------|----------------------------------------|----------------------------------
# distance                  | Reject   | Geodetic distance between entities     | For ground facilities
# --------------------------|-------|----------------------------------------|----------------------------------
# type                      | Reject   | Remove pairs with type mismatch        | For lists with uncertain types.
#                           |       | (ground/space if type confidence is 0) |
# --------------------------|-------|----------------------------------------|----------------------------------
# date                      | Reject   | Remove candidate pairs that have a     | When spacecraft in lists (launch)
#                           |       | different date                         | or other (opening, end date)
# --------------------------|-------|----------------------------------------|----------------------------------
# aperture                  | Reject   | Compare two facilities' aperture       | Anytime when there are apertures
# --------------------------|-------|----------------------------------------|----------------------------------
# identifier                | Reject   | Check that two entities do not have    | When two lists share identifiers
#                           |       | different identifiers                  | (NSSDCA_ID, COSPAR_ID, NAIF_ID)
# --------------------------|-------|----------------------------------------|----------------------------------
# acronym	            | Form    | Probability of a label to be           | When a list uses acronyms
#                           |       | the acronym of another label           |
# --------------------------|-------|----------------------------------------|----------------------------------
# levenshtein_similarity    | Form    | 1 - edition ratio between              | To fix typos. When both lists 
#                           |       | labels                                 | have similar naming convention
# --------------------------|-------|----------------------------------------|----------------------------------
# digit                     | Form    | Get digits similarity ratio from the   | Anytime. Has a low influence on
#                           |       | entities' fields                       | the scores.
# --------------------------|-------|----------------------------------------|----------------------------------
# tfidf			    | Embeddings    | Encode each word of the entity's       | When both list have definitions
#                           |       | definition                             | and/or descriptions
# --------------------------|-------|----------------------------------------|----------------------------------
# sentence_cosine_similarity| Embeddings    | Transformer encodes definitions        | When both list have definitions
#                           |       | and compute a Cosine Similarity score  | and/or descriptions. On GPU
# --------------------------|-------|----------------------------------------|----------------------------------
# llm_embedding             | Embeddings   | Cosine similarity on embeddings by LLM | Anytime but time consuming.
# --------------------------|-------|----------------------------------------|----------------------------------
#
#
# Available types:
#            ground observatory,
#            telescope,
#            spacecraft,
#            airborne,
#            mission,
#            ufo
#
# Notes:
#  For non-typed or partially-typed lists, using the 'type' score may accelerate and increase the
#  mapping's quality, as 'type' differenciates ground and space facilities.

# Mapping strategy without Neural Network
iaumpc, wikidata[spacecraft]: label_match, identifier, levenshtein_similarity, tfidf
iaumpc, wikidata[all,-spacecraft]: label_match, identifier, distance, levenshtein_similarity, tfidf
spase, nssdc: type, label_match, identifier, date, levenshtein_similarity, tfidf, digit
spase, iaumpc: type, label_match, identifier, distance, date, levenshtein_similarity, tfidf
pds, wikidata: label_match, distance, date, levenshtein_similarity, tfidf, digit
pds, aas: acronym, distance, aperture, label_match, levenshtein_similarity, tfidf, digit
pds, spase: type, label_match, identifier, acronym, distance, levenshtein_similarity, tfidf, digit
imcce, naif[spacecraft]: label_match, identifier, date, levenshtein_similarity, tfidf, digit
