# A strategy defines a sequence of disambiguation scores to compute on lists.
# One line of the strategy processes a disambiguation between two lists.
#
# Format:
#   list1,list2[type,-except,-types]:tools,to,compute,-except,-tools
#   > "For list1 and list2, compute scores on types except for the scores and the types"
#
# example:
#   spase,aas: tfidf_cosine_similarity, distance
#   pds,wikidata[all,-spacecraft]:all, -levenshtein_similarity, -sentence_cosine_similarity
#
# There are four types of tools:
#   matchers: if some condition is respected, the two entities match
#   filters: if some condition is not respected, the two entities mismatch
#   embedders: remaining entities are embedded using embedders to compute a cosine similarity between them
#   scorers: compute a similarity score between two entities based on a certain criterion
#   
#
# External identifiers' mappings are done by default (see merge_identifiers function of map_ontologies.py)
#
#
# Author:
#   Liza Fretel (liza.fretel@obspm.fr)
#
#
# Available tools           | Type    | Description                            | When to use
# --------------------------|---------|----------------------------------------|----------------------------------
# label_match               | Matcher | Any label or alt label are identical   | When same naming convention
#---------------------------|---------|----------------------------------------|----------------------------------
# distance                  | Filter  | Geodetic distance between entities     | For ground facilities
# --------------------------|---------|----------------------------------------|----------------------------------
# type                      | Filter  | Remove pairs with type mismatch        | For lists with uncertain types.
#                           |         | (ground/space if type confidence is 0) |
# --------------------------|---------|----------------------------------------|----------------------------------
# date                      | Filter  | Remove candidate pairs that have a     | When spacecraft in lists (launch)
#                           |         | different date                         | or other (opening, end date)
# --------------------------|---------|----------------------------------------|----------------------------------
# aperture                  | Filter  | Compare two facilities' aperture       | Anytime when there are apertures
# --------------------------|---------|----------------------------------------|----------------------------------
# identifier                | Filter  | Check that two entities do not have    | When two lists share identifiers
#                           |         | different identifiers                  | (NSSDCA_ID, COSPAR_ID, NAIF_ID)
# --------------------------|---------|----------------------------------------|----------------------------------
# acronym	                | Scorer  | Probability of a label to be           | When a list uses acronyms
#                           |         | the acronym of another label           |
# --------------------------|---------|----------------------------------------|----------------------------------
# levenshtein_similarity    | Scorer  | Edition ratio between labels           | To fix typos. When both lists 
#                           |         |                                        | have a similar naming convention
# --------------------------|---------|----------------------------------------|----------------------------------
# digit                     | Scorer  | Get digits similarity ratio from the   | Anytime. Has a low influence on
#                           |         | entities' fields                       | the scores.
# --------------------------|---------|----------------------------------------|----------------------------------
# tfidf			            | Embedder| Encode each word of the entity's       | When both list have definitions
#                           |         | definition                             | and/or descriptions
# --------------------------|---------|----------------------------------------|----------------------------------
# sentence_cosine_similarity| Embedder| Transformer encodes definitions        | When both list have definitions
#                           |         | and compute a Cosine Similarity score  | and/or descriptions. On GPU
# --------------------------|---------|----------------------------------------|----------------------------------
# llm_embedding             | Embedder| Cosine similarity on embeddings by LLM | Anytime but time consuming.
# --------------------------|---------|----------------------------------------|----------------------------------

### No disambiguation (only label match) ###
nssdc, spase: type, label_match, identifier, date
nssdc, wikidata: type, label_match, identifier, date
iaumpc, wikidata[spacecraft]: label_match, identifier
iaumpc, pds: type, date, distance, label_match, identifier#, levenshtein_similarity, tfidf
iaumpc, spase: type, date, distance, label_match, identifier#, levenshtein_similarity, tfidf, digit
imcce, wikidata[spacecraft]: label_match, identifier
aas, wikidata: type, distance, label_match, aperture#, levenshtein_similarity, tfidf, digit, acronym
# pds, wikidata: type, distance, label_match, aperture, identifier, date

### Disambiguation with LLM ###
pds, aas: type, acronym, distance, aperture, label_match, identifier, levenshtein_similarity, tfidf, digit
pds, spase: type, acronym, distance, date, aperture, label_match, identifier, levenshtein_similarity, tfidf, digit # scores computation on CPU: ~2 hours
